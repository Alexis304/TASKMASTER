services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmaster-postgres
    environment:
      POSTGRES_DB: taskmaster
      POSTGRES_USER: taskmaster
      POSTGRES_PASSWORD: taskmaster123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmaster -d taskmaster"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmaster-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskmaster
      SPRING_DATASOURCE_USERNAME: taskmaster
      SPRING_DATASOURCE_PASSWORD: taskmaster123
      TASKMASTER_DEMO_ADMIN_EMAIL: admin@taskmaster.local
      TASKMASTER_DEMO_ADMIN_PASSWORD: Admin123*
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
