spring.application.name=taskmaster-api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/taskmaster;MODE=PostgreSQL;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

server.error.include-message=always
server.port=${PORT:${SERVER_PORT:8080}}

taskmaster.demo.admin.email=${TASKMASTER_DEMO_ADMIN_EMAIL:admin@taskmaster.local}
taskmaster.demo.admin.password=${TASKMASTER_DEMO_ADMIN_PASSWORD:Admin123*}
taskmaster.dni-api.url=${TASKMASTER_DNI_API_URL:https://apiperu.dev/api/dni}
taskmaster.dni-api.token=${TASKMASTER_DNI_API_TOKEN:}
taskmaster.soap.dni.endpoint-uri=${TASKMASTER_SOAP_DNI_ENDPOINT_URI:}
taskmaster.soap.report.endpoint-uri=${TASKMASTER_SOAP_REPORT_ENDPOINT_URI:}
